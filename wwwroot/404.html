<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBook — Página no encontrada</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
        }

        .not-found-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .not-found-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .not-found-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .not-found-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.75rem;
        }

        .not-found-desc {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .not-found-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .not-found-nav {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .not-found-brand {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .not-found-brand span { color: var(--accent); }

        .not-found-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }


    </style>
</head>
<body>

<nav class="not-found-nav">
    <a href="/index.html" class="not-found-brand">Pro<span>Book</span></a>
</nav>

<div class="not-found-wrap">
    <span class="not-found-icon">🏨</span>
    <div class="not-found-code">404</div>
    <div class="not-found-divider"></div>
    <h1 class="not-found-title">Página no encontrada</h1>
    <p class="not-found-desc">
        La página que buscas no existe o fue movida a otra dirección.
        Puede que la URL esté mal escrita o que el contenido haya sido eliminado.
    </p>
    <div class="not-found-actions">
        <a href="/index.html" class="btn btn-primary btn-lg">Ir al inicio</a>
        <button class="btn btn-outline btn-lg" onclick="history.back()">← Volver</button>
    </div>
</div>

<script src="/js/theme.js"></script>

<script src="/js/api.js"></script>

<script src="/js/auth.js"></script>
<script src="/js/ui.js"></script>

<script src="/js/notifications.js"></script>

<script>
    initTheme();
    // Si tiene sesión activa, ofrecer ir al dashboard
    document.addEventListener('DOMContentLoaded', function() {
        if (isLoggedIn()) {
            const role = getRole();
            const dashUrl = role === 'manager' ? '/manager-dashboard.html' : '/guest-dashboard.html';
            const actions = document.querySelector('.not-found-actions');
            const dashBtn = document.createElement('a');
            dashBtn.href = dashUrl;
            dashBtn.className = 'btn btn-outline btn-lg';
            dashBtn.textContent = '📊 Mi panel';
            actions.appendChild(dashBtn);
        }
    });
</script>
</body>
</html>
