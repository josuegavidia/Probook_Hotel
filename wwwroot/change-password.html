<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBook - Cambiar Contrasena</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        const savedTheme = localStorage.getItem('probook_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 2rem 2.5rem;
            text-align: center;
        }

        .auth-header-brand {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .auth-header-brand span { color: var(--accent); }

        .auth-header-desc {
            color: rgba(255,255,255,0.75);
            font-size: 0.875rem;
        }

        .auth-body { padding: 2rem 2.5rem; }

        .step-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .step-desc {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .notice-box {
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .notice-box strong { color: var(--text); }

        .success-view { display: none; text-align: center; padding: 1rem 0; }
        .success-view.active { display: block; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <a href="/index.html" class="auth-header-brand">Pro<span>Book</span></a>
        <p class="auth-header-desc">Seguridad de cuenta</p>
    </div>

    <div class="auth-body">
        <div id="alert-container"></div>

        <!-- Formulario de cambio -->
        <div id="form-view">
            <h2 class="step-title">Crea tu nueva contrasena</h2>

            <div class="notice-box">
                Ingresaste con una <strong>contrasena temporal</strong>.
                Por seguridad, debes crear una contrasena permanente antes de continuar.
            </div>

            <div class="form-group">
                <label class="form-label" for="new-password">Nueva contrasena</label>
                <input
                    type="password"
                    id="new-password"
                    class="form-control"
                    placeholder="Minimo 6 caracteres"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirmar contrasena</label>
                <input
                    type="password"
                    id="confirm-password"
                    class="form-control"
                    placeholder="Repite tu nueva contrasena"
                >
            </div>

            <button id="btn-change" class="btn btn-primary btn-block btn-lg" onclick="handleChange()">
                Guardar contrasena
            </button>
        </div>

        <!-- Vista de exito -->
        <div id="success-view" class="success-view">
            <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
            <h2 class="step-title" style="text-align:center;">Contrasena actualizada</h2>
            <p class="step-desc" style="text-align:center;">
                Tu contrasena fue guardada. Redirigiendo al sistema...
            </p>
        </div>
    </div>
</div>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/guest-dashboard.js"></script>
<script>
    initTheme();
    document.addEventListener("DOMContentLoaded", updateThemeBtn);

    // Esta pagina solo es valida si el usuario esta autenticado
    // y tiene RequiresPasswordChange = true.
    // Si llega aqui sin sesion, lo mandamos al login.
    document.addEventListener("DOMContentLoaded", function() {
        if (!isLoggedIn()) {
            window.location.href = '/login.html';
            return;
        }
        const user = getUser();
        // Si el usuario ya cambio su contrasena y llega aqui directamente,
        // lo mandamos a su dashboard sin mostrar el formulario
        if (user && !user.requiresPasswordChange) {
            const dest = user.role === 'manager'
                ? '/manager-dashboard.html'
                : '/guest-dashboard.html';
            window.location.href = dest;
        }
    });

    async function handleChange() {
        const newPassword     = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const btn             = document.getElementById('btn-change');

        clearAlert('alert-container');

        if (!newPassword || !confirmPassword) {
            showAlert('alert-container', 'Por favor completa ambos campos.');
            return;
        }

        if (newPassword.length < 6) {
            showAlert('alert-container', 'La contrasena debe tener al menos 6 caracteres.');
            return;
        }

        if (newPassword !== confirmPassword) {
            showAlert('alert-container', 'Las contrasenas no coinciden.');
            return;
        }

        setLoading(btn, true);

        try {
            // Llama al nuevo endpoint que cambia la contrasena y apaga RequiresPasswordChange
            await apiPost('/Auth/change-password', {
                newPassword,
                confirmPassword
            }, true);

            // Actualizar el objeto de usuario en localStorage para que no vuelva a redirigir aqui
            const user = getUser();
            if (user) {
                user.requiresPasswordChange = false;
                localStorage.setItem('probook_user', JSON.stringify(user));
            }

            // Mostrar pantalla de exito y redirigir en 2 segundos
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('success-view').classList.add('active');

            setTimeout(() => {
                const role = getRole();
                window.location.href = role === 'manager'
                    ? '/manager-dashboard.html'
                    : '/guest-dashboard.html';
            }, 2000);

        } catch (error) {
            showAlert('alert-container', error.message || 'Error al actualizar la contrasena.');
        } finally {
            setLoading(btn, false);
        }
    }
</script>
</body>
</html>
