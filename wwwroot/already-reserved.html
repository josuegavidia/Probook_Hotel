<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBook - Ya Tienes Reserva</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        const savedTheme = localStorage.getItem('probook_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        .blocked-wrapper {
            max-width: 560px;
            margin: 3rem auto;
            padding: 0 1rem;
            text-align: center;
        }

        .blocked-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #E67E22, #F39C12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.3);
        }

        .blocked-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .blocked-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .existing-reservation {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .existing-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 1.25rem 1.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .existing-room-number {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .existing-room-type {
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
        }

        .existing-status {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .existing-body {
            padding: 1.5rem 1.75rem;
        }

        .existing-detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .existing-detail-item {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 0.85rem 1rem;
        }

        .existing-detail-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .existing-detail-value {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .blocked-wrapper { animation: fadeInUp 0.4s ease; }





    </style>
</head>
<body style="background:var(--bg)">

<!-- Navbar simple -->
<nav class="navbar">
    <a href="/guest-dashboard.html" class="navbar-brand">Pro<span>Book</span></a>
    <div id="nav-user" class="navbar-user"></div>
</nav>

<div class="blocked-wrapper">
    <div class="blocked-icon">🔒</div>
    <h1 class="blocked-title">Ya tienes una reserva</h1>
    <p class="blocked-subtitle">
        Aqui estan los detalles de tu reserva activa.
        Para modificar fechas o cancelarla, ve a tu panel.
    </p>

    <!-- Datos de la reserva existente -->
    <div class="existing-reservation" id="reservation-card">
        <div style="padding:2rem;text-align:center">
            <span class="spinner spinner-primary"></span>
        </div>
    </div>

    <div class="actions">
        <a href="/guest-dashboard.html" class="btn btn-primary btn-lg">
            Ir a mi panel
        </a>
    </div>
</div>

<script src="/js/theme.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/guest-dashboard.js"></script>
<script>
    requireAuth('guest');
    renderNavbar('guest');

    // ── Verificación RÁPIDA desde localStorage ──────────────────────────────
    // Usa parseCheckOut() en lugar de un regex frágil para extraer la fecha
    // de checkout del campo reservedDates ("dd-MM-yyyy - dd-MM-yyyy").
    (function checkLocalExpiry() {
        const u = getUser();
        if (!u) return;

        const checkOut = parseCheckOut(u.reservedDates || '');
        if (!checkOut) return;

        const hondurasNow = new Date(Date.now() - 6 * 60 * 60 * 1000);
        if (checkOut < hondurasNow) {
            // La reserva ya expiró según localStorage — limpiar y redirigir sin esperar al servidor
            clearReservationFromUser(u);
            window.location.href = '/guest-dashboard.html';
        }
    })();

    // Extrae la fecha de checkout de "dd-MM-yyyy - dd-MM-yyyy"
    // Retorna un Date UTC o null si el formato es inválido.
    function parseCheckOut(datesStr) {
        if (!datesStr) return null;
        // Tomar la segunda parte después del separador " - "
        const parts = datesStr.split(' - ');
        if (parts.length < 2) return null;
        const [dd, mm, yyyy] = parts[1].trim().split('-');
        if (!dd || !mm || !yyyy || dd.length > 2 || mm.length > 2 || yyyy.length !== 4) return null;
        const d = new Date(`${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}T00:00:00Z`);
        return isNaN(d.getTime()) ? null : d;
    }

    // Limpia los campos de reserva del usuario en localStorage
    function clearReservationFromUser(u) {
        u.hasReserved    = false;
        u.reservedRoomId = null;
        u.reservedDates  = null;
        localStorage.setItem('probook_user', JSON.stringify(u));
    }

    loadReservation();

    async function loadReservation() {
        try {
            const r = await apiGet('/Reservations/my');

            // Detectar si la reserva ya expiró (checkOut < ahora Honduras UTC-6)
            const parts       = r.checkOutDate.split('-');
            const checkOutUTC = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00Z`);
            const hondurasNow = new Date(Date.now() - 6 * 60 * 60 * 1000);
            const hasExpired  = checkOutUTC < hondurasNow;
            const isCancelled = r.status === 'cancelled';

            if (hasExpired || isCancelled) {
                const u = getUser();
                if (u) clearReservationFromUser(u);
                window.location.href = '/guest-dashboard.html';
                return;
            }

            renderReservation(r);
        } catch {
            const u = getUser();
            if (u) clearReservationFromUser(u);
            window.location.href = '/guest-dashboard.html';
        }
    }

    function renderReservation(r) {
        document.getElementById('reservation-card').innerHTML = `
                <div class="existing-header">
                    <div>
                        <div class="existing-room-number">Hab. ${r.roomNumber}</div>
                        <div class="existing-room-type">${r.roomType}</div>
                    </div>
                    <div class="existing-status">Confirmada</div>
                </div>
                <div class="existing-body">
                    <div class="existing-detail-grid">
                        <div class="existing-detail-item">
                            <div class="existing-detail-label">Check-in</div>
                            <div class="existing-detail-value">${formatDate(r.checkInDate)}</div>
                        </div>
                        <div class="existing-detail-item">
                            <div class="existing-detail-label">Check-out</div>
                            <div class="existing-detail-value">${formatDate(r.checkOutDate)}</div>
                        </div>
                        <div class="existing-detail-item">
                            <div class="existing-detail-label">Noches</div>
                            <div class="existing-detail-value">${r.nights}</div>
                        </div>
                    </div>
                </div>`;
    }
</script>
</body>
</html>
